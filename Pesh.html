<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pephica Electronics - Premium Gadgets</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <style>
    .product-card { transition: all 0.3s; }
    .product-card:hover { transform: translateY(-10px); box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.15); }
    .hero-bg {
      background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), url('https://picsum.photos/id/1015/2000/1200');
      background-size: cover;
      background-position: center;
    }
  </style>
</head>
<body class="bg-gray-950 text-gray-100">

  <!-- Header -->
  <header class="bg-black border-b border-gray-800 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
      <h1 class="text-4xl font-bold bg-gradient-to-r from-blue-500 to-cyan-400 bg-clip-text text-transparent">
        Pephica
      </h1>
      
      <div class="flex-1 max-w-2xl mx-8">
        <input id="searchInput" type="text" placeholder="Search products..." 
               class="w-full px-6 py-4 bg-gray-900 border border-gray-700 rounded-3xl focus:outline-none focus:border-blue-500 text-lg"/>
      </div>

      <button onclick="toggleCart()" class="relative text-3xl hover:text-blue-400 transition">
        <i class="fa-solid fa-shopping-cart"></i>
        <span id="cartCount" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs font-bold rounded-full w-6 h-6 flex items-center justify-center">0</span>
      </button>
    </div>
  </header>

  <!-- Hero -->
  <section class="hero-bg h-screen flex items-center">
    <div class="max-w-7xl mx-auto px-6 text-center">
      <h2 class="text-6xl md:text-7xl font-bold mb-6">Premium Electronics</h2>
      <p class="text-2xl mb-10 text-gray-300">Discover cutting-edge gadgets at Pephica Electronics</p>
      <button onclick="document.getElementById('products').scrollIntoView({behavior:'smooth'})" 
              class="bg-blue-600 hover:bg-blue-700 text-white px-12 py-5 rounded-2xl text-2xl font-semibold transition">
        Shop Now
      </button>
    </div>
  </section>

  <!-- Products Section -->
  <section id="products" class="max-w-7xl mx-auto px-6 py-20">
    <h2 class="text-4xl font-bold mb-12 text-center">Our Products</h2>
    
    <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
      <!-- Products will be added here -->
    </div>
  </section>

  <!-- Cart Sidebar -->
  <div id="cartSidebar" class="fixed top-0 right-0 h-full w-96 bg-gray-900 shadow-2xl transform translate-x-full transition-transform duration-300 z-50 overflow-y-auto">
    <div class="p-6">
      <div class="flex justify-between items-center mb-8 border-b border-gray-700 pb-6">
        <h3 class="text-3xl font-bold">Your Cart</h3>
        <button onclick="toggleCart()" class="text-4xl text-gray-400 hover:text-white">×</button>
      </div>
      
      <div id="cartItems" class="space-y-8 mb-10 min-h-[200px]"></div>
      
      <div class="border-t border-gray-700 pt-8">
        <div class="flex justify-between text-2xl font-semibold mb-8">
          <span>Total</span>
          <span id
